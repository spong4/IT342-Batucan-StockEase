spring.application.name=StockEase

# Server Configuration
server.port=8080
server.servlet.context-path=/api/v1

# Database Configuration - MySQL (XAMPP)
spring.datasource.url=jdbc:mysql://localhost:3306/stockease?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=stockease-secret-key-minimum-32-chars-needed-123456789
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# CORS Configuration
cors.allowed.origins=http://localhost:3000,http://localhost:3001

# File Upload Configuration
file.upload.dir=uploads/products/

# Mail Configuration (for testing, set to mock or configure actual SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Logging
logging.level.root=INFO
logging.level.edu.cit.batucan.StockEase=DEBUG
