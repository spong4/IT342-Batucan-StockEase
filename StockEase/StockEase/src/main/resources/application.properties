spring.application.name=StockEase

# Server Configuration
server.port=8080
server.servlet.context-path=/api/v1

# Database Configuration - MySQL (XAMPP)
spring.datasource.url=jdbc:mysql://localhost:3306/stockease?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=stockease-secret-key-min-32-chars-needed-123456
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.edu.cit.batucan.StockEase=DEBUG
